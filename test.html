<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindMirror - Personality Test</title>
<link rel="stylesheet" href="style.css">

<!-- AUTH CHECK FIRST -->
<script src="auth.js"></script>
<script>
  if (!localStorage.getItem("login")) {
    location.href = "login.html";
  }
</script>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>MindMirror</h2>

  <a href="index.html">Home</a>
  <a href="test.html">Test</a>
  <a href="mood.html">Mood</a>
  <a href="journal.html">Journal</a>
  <a href="analyse.html">Analysis</a>
  <a href="profile.html">Profile</a>
  <a href="about.html">About</a>

  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN TEST UI -->
<div class="page">

  <div class="glass">

    <!-- TITLE -->
    <h2 class="title">Personality Test</h2>

    <!-- QUESTION NUMBER -->
    <p id="qnum" style="text-align:center; font-size:14px; opacity:0.7;"></p>

    <!-- QUESTION -->
    <h3 id="q"></h3>

    <!-- OPTIONS -->
    <div id="opt"></div>

    <!-- PROGRESS BAR -->
    <div class="progress-container">
      <div id="bar"></div>
    </div>

    <!-- BUTTONS -->
    <div class="btns">
      <button id="prevBtn" onclick="prev()">Previous</button>
      <button id="nextBtn" onclick="next()">Next</button>
    </div>

  </div>

</div>

<script src="test.js"></script>

</body>
</html>
